<!DOCTYPE html>
<html>
<head>
    <title>Admin Menu</title>
    <style>
        body {
            font-family: Arial;
            max-width: 600px;
            margin: auto;
        }

        .dish {
            border-bottom: 1px solid #ccc;
            padding: 8px;
        }

        button {
            margin-left: 10px;
        }

        .on {
            color: green;
        }

        .off {
            color: red;
        }
    </style>
</head>
<body>

<h2> Admin - Menu Control</h2>

<div id="menu"></div>

<script>
fetch("/api/dishes/all")
.then(res => res.json())
.then(data => {
    const div = document.getElementById("menu");

    data.forEach(d => {
        div.innerHTML += `
            <div class="dish">
                ${d.nameEn} (${d.nameCn})
                <span class="${d.availableToday ? 'on' : 'off'}">
                    ${d.availableToday ? 'ON' : 'OFF'}
                </span>
                <input type="checkbox" id="dish-${d.id}" ${d.availableToday ? "checked" : ""}>            </div>
        `;
    });
});

function toggle(id) {
    fetch(`/api/dishes/${id}/toggle`, {
        method: "PUT"
    }).then(() => location.reload());
}

function saveMenu() {

    let updates = [];

    document.querySelectorAll("[id^='dish-']").forEach(el => {

        const id = el.id.split("-")[1];
        const available = el.checked;

        updates.push({
            id: id,
            availableToday: available
        });
    });

    fetch("/api/dishes/batch", {
        method: "PUT",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify(updates)
    })
    .then(() => {
        alert("Menu updated!");
    });
}

</script>

<br><br>
<button onclick="saveMenu()">Save</button>

</body>
</html>
