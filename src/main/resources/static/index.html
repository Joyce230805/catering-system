<!DOCTYPE html>
<html>
<head>
    <title>Catering Order</title>
    <style>
        body {
            font-family: Arial;
            max-width: 600px;
            margin: auto;
            padding: 20px;
        }

        .meal {
            border: 1px solid #ccc;
            padding: 10px;
            margin-bottom: 15px;
            border-radius: 10px;
        }

        h3 {
            margin: 5px 0;
        }

        button {
            padding: 8px 12px;
            margin-top: 10px;
            cursor: pointer;
        }

        .add-btn {
            background: #28a745;
            color: white;
        }

        .submit-btn {
            background: #007bff;
            color: white;
            width: 100%;
        }

        .remove-btn {
            background: red;
            color: white;
        }

        
    </style>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catering Order</title>
</head>
<body>

<h2> Catering Order</h2>

<div id="orders"></div>

<button class="add-btn" onclick="addMeal()"> Add Meal</button>

<br><br>

<b>Name:</b><br>
<input type="text" id="name"><br><br>

<b>Phone:</b><br>
<input type="text" id="phone"><br><br>

<b>Method:</b><br>
<select id="method" onchange="toggleAddress()">
    <option value="pickup">Pick Up</option>
    <option value="delivery">Delivery</option>
</select><br><br>

<div id="addressDiv" style="display:none;">
    <b>Address:</b><br>
    <input type="text" id="address"><br><br>
</div>

<b>Pickup Time:</b><br>
<input type="datetime-local" id="time"><br><br>

<button class="submit-btn" onclick="submitOrder()">Submit Order</button>

<p id="result"></p>

<script>
let dishes = [];
let mealCount = 0;

// 取得菜單
fetch("/api/dishes/today")
.then(res => res.json())
.then(data => {
    dishes = data;
    addMeal();
});

// 新增一份餐
function addMeal() {
    mealCount++;

    const container = document.getElementById("orders");

    let html = `<div class="meal" id="meal-${mealCount}">
        <h3>Meal ${mealCount}</h3>

        <b>Main (choose 1)</b><br>`;

    dishes.filter(d => d.category === "MAIN").forEach(d => {
        html += `<input type="radio" name="main-${mealCount}" value="${d.nameEn}">
                 ${d.nameEn} (${d.nameCn})<br>`;
    });

    html += `<br><b>Sides (choose 2~3 total)</b><br>`;

    dishes.filter(d => d.category === "SIDE").forEach(d => {
        html += `
        <div>
            ${d.nameEn} (${d.nameCn})
            <button onclick="changeQty(${mealCount}, '${d.nameEn}', -1)">-</button>
            <span id="side-${mealCount}-${d.nameEn}">0</span>
            <button onclick="changeQty(${mealCount}, '${d.nameEn}', 1)">+</button>
        </div>
        `;
    });

   
    html += `<br>Qty: 
        <input type="number" id="qty-${mealCount}" value="1" min="1" style="width:60px">

        <br><button class="remove-btn" onclick="removeMeal(${mealCount})"> Remove</button>
    </div>`;

    container.insertAdjacentHTML("beforeend", html);
}

//限制數量
function checkSides(mealId) {

    const checked = document.querySelectorAll(`input[name="side-${mealId}"]:checked`);

    // 超過3個
    if (checked.length > 3) {
        alert("Choose up to 3 dishes.");
        checked[checked.length - 1].checked = false;
        return;
    }

    // 少於2個（提示，不阻擋）
    if (checked.length < 2) {
        document.getElementById("result").innerText = "At least 2 dishes.";
    } else {
        document.getElementById("result").innerText = "";
    }
}

// 刪除餐
function removeMeal(id) {

    document.getElementById(`meal-${id}`).remove();

    // 清掉該meal的side
    Object.keys(sideCounts).forEach(key => {
        if (key.startsWith(id + "-")) {
            delete sideCounts[key];
        }
    });
}

//地址
function toggleAddress() {
    const method = document.getElementById("method").value;
    document.getElementById("addressDiv").style.display =
        method === "delivery" ? "block" : "none";
}

// 送出訂單
function submitOrder() {

    const name = document.getElementById("name").value;
    const phone = document.getElementById("phone").value;
    const time = document.getElementById("time").value;
    const method = document.getElementById("method").value;
    const address = document.getElementById("address").value;

    if (method === "delivery" && !address) {
        alert("Please enter address");
        return;
    }


    if (!name || !phone || !time) {
        alert("Please fill all customer info");
        return;
    }

    let items = [];

    for (let i = 1; i <= mealCount; i++) {

        const main = document.querySelector(`input[name="main-${i}"]:checked`);
        
        
        let selectedSides = [];

        Object.keys(sideCounts).forEach(key => {
            if (key.startsWith(i + "-")) {

                const name = key.split("-")[1];
                const qty = sideCounts[key];

                for (let k = 0; k < qty; k++) {
                    selectedSides.push(name);
                }
            }
        });    

        const qtyInput = document.getElementById(`qty-${i}`);

        if (!qtyInput) continue; // 已刪除

        if (!main) {
            alert(`Meal ${i}: Please select a main`);
            return;
        }

        let totalSides = selectedSides.length;

        if (totalSides < 2 || totalSides > 3) {
            alert(`Meal ${i}: Select total 2–3 sides`);
            return;
        }

        items.push({
            main: main.value,
            sides: selectedSides,
            quantity: parseInt(qtyInput.value)
        });
    }

    if (items.length === 0) {
        alert("Please add at least one meal");
        return;
    }

    const data = {
        customerName: name,
        phone: phone,
        pickupTime: time,
        method: method,
        address: address,
        items: items
    };

    fetch("/api/orders", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify(data)
    })
    // 先顯示 loading
document.getElementById("result").innerText = "Submitting... Please wait ⏳";

// 禁用按鈕避免重複送
document.querySelector(".submit-btn").disabled = true;

fetch("/api/orders", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify(data)
})
    .then(res => {

        if (res.ok) {
            window.location.href = "/success.html";
        } else {
            alert("Submit failed");
        }
    })
    .catch(() => {
        document.getElementById("result").innerText = "Error submitting order";
    })
    .finally(() => {
        document.querySelector(".submit-btn").disabled = false;
    }); 
}

let sideCounts = {};

function changeQty(mealId, sideName, delta) {

    const key = `${mealId}-${sideName}`;

    if (!sideCounts[key]) sideCounts[key] = 0;

    sideCounts[key] += delta;

    if (sideCounts[key] < 0) sideCounts[key] = 0;

    // 算總數
    let total = 0;
    Object.keys(sideCounts).forEach(k => {
        if (k.startsWith(mealId + "-")) {
            total += sideCounts[k];
        }
    });

    // 超過3
    if (total > 3) {
        sideCounts[key]--;
        alert("Choose up to 3 dishes.");
        return;
    }

    // 更新UI
    document.getElementById(`side-${mealId}-${sideName}`).innerText = sideCounts[key];
}
</script>

</body>
</html>
