<!DOCTYPE html>
<html>
<head>
    <title>Catering Order</title>
    <style>
        body {
            font-family: Arial;
            max-width: 600px;
            margin: auto;
            padding: 20px;
        }

        .meal {
            border: 1px solid #ccc;
            padding: 10px;
            margin-bottom: 15px;
            border-radius: 10px;
        }

        h3 {
            margin: 5px 0;
        }

        button {
            padding: 8px 12px;
            margin-top: 10px;
            cursor: pointer;
        }

        .add-btn {
            background: #28a745;
            color: white;
        }

        .submit-btn {
            background: #007bff;
            color: white;
            width: 100%;
        }

        .remove-btn {
            background: red;
            color: white;
        }
    </style>
</head>
<body>

<h2> Catering Order</h2>

<div id="orders"></div>

<button class="add-btn" onclick="addMeal()"> Add Meal</button>

<br><br>

<b>Name:</b><br>
<input type="text" id="name"><br><br>

<b>Phone:</b><br>
<input type="text" id="phone"><br><br>

<b>Pickup Time:</b><br>
<input type="datetime-local" id="time"><br><br>

<button class="submit-btn" onclick="submitOrder()">Submit Order</button>

<p id="result"></p>

<script>
let dishes = [];
let mealCount = 0;

// 取得菜單
fetch("/api/dishes/today")
.then(res => res.json())
.then(data => {
    dishes = data;
    addMeal();
});

// 新增一份餐
function addMeal() {
    mealCount++;

    const container = document.getElementById("orders");

    let html = `<div class="meal" id="meal-${mealCount}">
        <h3>Meal ${mealCount}</h3>

        <b>Main (choose 1)</b><br>`;

    dishes.filter(d => d.category === "MAIN").forEach(d => {
        html += `<input type="radio" name="main-${mealCount}" value="${d.nameEn}">
                 ${d.nameEn} (${d.nameCn})<br>`;
    });

    html += `<br><b>Sides (choose 2~3)</b><br>`;

    dishes.filter(d => d.category === "SIDE").forEach(d => {
        html += `<input type="checkbox" name="side-${mealCount}" value="${d.nameEn}">
                 ${d.nameEn} (${d.nameCn})<br>`;
    });

    html += `<br>Qty: 
        <input type="number" id="qty-${mealCount}" value="1" min="1" style="width:60px">

        <br><button class="remove-btn" onclick="removeMeal(${mealCount})"> Remove</button>
    </div>`;

    container.innerHTML += html;
}

// 刪除餐
function removeMeal(id) {
    document.getElementById(`meal-${id}`).remove();
}

// 送出訂單
function submitOrder() {

    const name = document.getElementById("name").value;
    const phone = document.getElementById("phone").value;
    const time = document.getElementById("time").value;

    if (!name || !phone || !time) {
        alert("Please fill all customer info");
        return;
    }

    let items = [];

    for (let i = 1; i <= mealCount; i++) {

        const main = document.querySelector(`input[name="main-${i}"]:checked`);
        const sides = document.querySelectorAll(`input[name="side-${i}"]:checked`);
        const qtyInput = document.getElementById(`qty-${i}`);

        if (!qtyInput) continue; // 已刪除

        if (!main) {
            alert(`Meal ${i}: Please select a main`);
            return;
        }

        if (sides.length < 2 || sides.length > 3) {
            alert(`Meal ${i}: Select 2–3 sides`);
            return;
        }

        items.push({
            main: main.value,
            sides: Array.from(sides).map(s => s.value),
            quantity: parseInt(qtyInput.value)
        });
    }

    if (items.length === 0) {
        alert("Please add at least one meal");
        return;
    }

    const data = {
        customerName: name,
        phone: phone,
        pickupTime: time,
        items: items
    };

    fetch("/api/orders", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify(data)
    })
    .then(() => {
        document.getElementById("result").innerText = " Order submitted!";
        document.getElementById("orders").innerHTML = "";
        mealCount = 0;
        addMeal();
    })
    .catch(() => {
        document.getElementById("result").innerText = " Error submitting order";
    });
}
</script>

</body>
</html>
